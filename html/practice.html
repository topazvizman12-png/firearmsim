<!DOCTYPE html>
<html lang="he" dir="rtl">

<head>
    <meta charset="UTF-8">
    <title>סימולטור ירי | תרגול</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- CSS שלך -->
    <link rel="stylesheet" href="../css/styles.css">
</head>

<body data-auth="required">

<!-- ===== NAVBAR ===== -->
<nav class="navbar navbar-expand-lg navbar-light bg-light shadow-sm">
    <div class="container-fluid">

        <a class="navbar-brand fw-bold text-primary" href="index.html">
            Shooting Simulator
        </a>

        <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#mainNavbar">
            <span class="navbar-toggler-icon"></span>
        </button>

        <div class="collapse navbar-collapse justify-content-end" id="mainNavbar">
            <ul class="navbar-nav mb-2 mb-lg-0">

                <li class="nav-item">
                    <a class="nav-link" href="index.html">עמוד הבית</a>
                </li>

                <li class="nav-item">
                    <a class="nav-link active" href="practice.html">תרגול</a>
                </li>

                <li class="nav-item">
                    <a class="nav-link" href="about.html">אודות</a>
                </li>

                <li class="nav-item">
                    <a class="nav-link" href="login.html">התחברות</a>
                </li>

            </ul>
        </div>

    </div>
</nav>

<!-- ===== תוכן ===== -->
<main class="container py-5">

    <div class="card shadow-sm p-4 mb-4 text-center">

        <h2 class="mb-4">תרגול</h2>

        <button id="startPracticeBtn" class="btn btn-danger mb-4">
            Start Practice
        </button>

        <div class="row g-3">

            <div class="col-md-4">
                <div class="card p-3">
                    <div>סטטוס</div>
                    <div id="practiceStatusText">אימון מספר 0</div>
                </div>
            </div>

            <div class="col-md-4">
                <div class="card p-3">
                    <div>טיימר</div>
                    <div id="practiceLiveTimerText">0.000</div>
                </div>
            </div>

            <div class="col-md-4">
                <div class="card p-3">
                    <div>זמן תגובה</div>
                    <div id="practiceReactionText">—</div>
                </div>
            </div>

            <div class="col-md-6">
                <div class="card p-3">
                    <div>פגיעות</div>
                    <div id="hitsText">0</div>
                </div>
            </div>

            <div class="col-md-6">
                <div class="card p-3">
                    <div>מחסנית</div>
                    <div id="magazineText">9</div>
                </div>
            </div>

        </div>

        <div class="mt-4">
            <button id="trainingTimeBtn" class="btn btn-outline-primary" disabled>
                Training Time
            </button>

            <button id="endPracticeBtn" class="btn btn-outline-primary" disabled>
                End Practice
            </button>

            <button id="resetBtn" class="btn btn-outline-danger">
                איפוס
            </button>
        </div>

    </div>

    <!-- ===== טבלה ===== -->
    <div class="card shadow-sm p-4 mb-4">

        <div class="d-flex justify-content-between align-items-center mb-3">
            <h3 class="mb-0">טבלת אימונים</h3>

            <button id="resetTableBtn" class="btn btn-outline-danger">
                איפוס טבלה
            </button>
        </div>

        <div class="table-responsive">
            <table class="table table-striped text-center align-middle">
                <thead>
                    <tr>
                        <th>מספר אימון</th>
                        <th>כמות פגיעות</th>
                        <th>זמן</th>
                    </tr>
                </thead>
                <tbody id="sessionsTbody"></tbody>
            </table>
        </div>

    </div>

    <!-- ===== גרפים ===== -->
<div class="row g-4 mt-4">

    <div class="col-md-4">
        <div class="card shadow-sm p-3 text-center chart-card-small">
            <h5>זמן תגובה</h5>
            <div class="chart-container">
                <canvas id="reactionChart"></canvas>
            </div>
        </div>
    </div>

    <div class="col-md-4">
        <div class="card shadow-sm p-3 text-center chart-card-small">
            <h5>פגיעות</h5>
            <div class="chart-container">
                <canvas id="hitsChart"></canvas>
            </div>
        </div>
    </div>

    <div class="col-md-4">
        <div class="card shadow-sm p-3 text-center chart-card-small">
            <h5>דיוק</h5>
            <div class="chart-container">
                <canvas id="accuracyChart"></canvas>
            </div>
        </div>
    </div>


</main>

<!-- ===== JS ===== -->
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-auth.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>

<script src="../js/firebaseconfig.js"></script>
<script src="../js/practice.js"></script>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
